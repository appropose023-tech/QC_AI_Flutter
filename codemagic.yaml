workflows:
  build_app:
    name: Universal Flutter Project Builder
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:

      # ----------------------------------------------------
      # 1. Create Full Flutter Project Scaffold
      # ----------------------------------------------------
      - name: Scaffold Flutter Multiplatform Project
        script: |
          echo ">>> Backing up repository..."
          mkdir -p /tmp/repo_files
          rsync -av ./ /tmp/repo_files \
            --exclude ".git" \
            --exclude ".dart_tool" \
            --exclude "build" \
            --exclude ".gradle"

          echo ">>> Cleaning workspace..."
          find . -mindepth 1 -maxdepth 1 -not -name "." -exec rm -rf {} \;

          echo ">>> Creating new Flutter project with all platforms..."
          flutter create --platforms=android,ios,web,linux,macos,windows --project-name pcb_app .

      # ----------------------------------------------------
      # 2. Inject repository content
      # ----------------------------------------------------
      - name: Restore Project Source Code
        script: |
          echo ">>> Restoring lib folder..."
          rm -rf lib
          cp -R /tmp/repo_files/lib ./lib

          echo ">>> Restoring pubspec.yaml if exists..."
          if [ -f "/tmp/repo_files/pubspec.yaml" ]; then
            cp /tmp/repo_files/pubspec.yaml ./pubspec.yaml
          else
            echo "No pubspec.yaml found — keeping auto-generated one."
          fi

      # ----------------------------------------------------
      # 3. Apply Android Overrides
      # ----------------------------------------------------
      - name: Apply Android Overrides
        script: |
          if [ -d "/tmp/repo_files/android_overrides" ]; then
            echo ">>> Applying Android override files..."
            rsync -av /tmp/repo_files/android_overrides/ ./android/app/
          else
            echo "No android_overrides directory found!"
          fi

          echo ">>> Ensure network_security_config path..."
          mkdir -p android/app/src/main/res/xml

          if [ -f "/tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml" ]; then
            cp /tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml \
               android/app/src/main/res/xml/network_security_config.xml
          fi

      # ----------------------------------------------------
      # 4. Install Dependencies
      # ----------------------------------------------------
      - name: Flutter pub get
        script: flutter pub get

      # ----------------------------------------------------
      # 5. Build Android APK
      # ----------------------------------------------------
      - name: Build Android APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
