workflows:
  build_apk:
    name: Build PCB Inspector APK
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Backup repo's lib folder
        script: |
          echo "Backing up lib/"
          mkdir lib_backup
          cp -R lib/* lib_backup/

      - name: Backup repo's android_overrides folder
        script: |
          echo "Backing up android_overrides/"
          mkdir android_overrides_backup
          cp -R android_overrides/* android_overrides_backup/

      - name: Create full Flutter project structure
        script: |
          echo "Creating Flutter project..."
          flutter create --platforms=android .

      - name: Restore your lib into Flutter project
        script: |
          echo "Restoring lib/"
          rm -rf lib/*
          cp -R lib_backup/* lib/

      - name: Inject Android overrides
        script: |
          echo "Injecting AndroidManifest + network_security_config"
          mkdir -p android/app/src/main/res/xml
          cp android_overrides_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_overrides_backup/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml

      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Build Release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
