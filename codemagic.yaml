workflows:
  build_app:
    name: Build PCB Inspector App
    environment:
      flutter: stable
      vars:
        APP_NAME: "pcb_inspector"
    scripts:
      - name: Create Flutter project
        script: |
          if [ ! -d "./$APP_NAME" ]; then
            flutter create $APP_NAME
          fi

      - name: Replace lib folder with repository lib
        script: |
          rm -rf $APP_NAME/lib
          mkdir -p $APP_NAME/lib
          cp -R lib/* $APP_NAME/lib/

      - name: Remove default pubspec — create new minimal one
        script: |
          cat > $APP_NAME/pubspec.yaml <<EOF
          name: pcb_inspector
          description: PCB Defect Inspection App
          publish_to: "none"

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            http: ^1.1.0
            camera: ^0.11.0+2
            path_provider: ^2.1.4
            gallery_saver_updated: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: Run flutter pub get
        script: |
          cd $APP_NAME
          flutter pub get

      - name: Build APK
        script: |
          cd $APP_NAME
          flutter build apk --release

    artifacts:
      - $APP_NAME/build/app/outputs/flutter-apk/app-release.apk

  
