workflows:
  build_app:
    name: PCB App Builder
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Hard Reset and Scaffold
        script: | 
          # 1. Move your repo files to a safe zone (the /tmp folder)
          echo "Moving repository files to temp storage..."
          mkdir -p /tmp/repo_files
          
          # Move everything from current dir to temp, then clear current dir
          cp -R . /tmp/repo_files/
          find . -maxdepth 1 -not -path '*/.*' -delete 

          # 2. Force generate a brand new Flutter project structure
          # This MUST create the 'android' directory
          flutter create --force --project-name pcb_app .
          
          # 3. Verify the directory exists before proceeding
          if [ ! -d "android" ]; then
            echo "❌ ERROR: Flutter failed to create the android directory."
            exit 1
          fi

      - name: Inject Repository Code
        script: |
          echo "Restoring lib and overrides..."
          
          # Remove the boilerplate lib and restore yours
          rm -rf lib
          cp -R /tmp/repo_files/lib ./lib
          
          # Restore pubspec.yaml (crucial for dependencies)
          cp /tmp/repo_files/pubspec.yaml ./pubspec.yaml

          # 4. Apply Android overrides
          # We use -a to preserve structure and ensure it treats 'android' as the destination
          if [ -d "/tmp/repo_files/android_overrides" ]; then
            echo "Applying Android overrides..."
            cp -Rv /tmp/repo_files/android_overrides/* ./android/
          else
            echo "No android_overrides folder found in git."
          fi

      - name: Install Dependencies
        script: |
          flutter pub get

      - name: Build Android Release
        script: |
          flutter build apk --release
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
