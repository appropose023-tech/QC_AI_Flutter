workflows:
  build_app:
    name: Build Flutter APK
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        APP_NAME: pcb_inspector

    scripts:
      - name: Create flutter structure
        script: |
          flutter create $APP_NAME
          rm -rf $APP_NAME/lib/*
          cp -R lib/* $APP_NAME/lib/

      - name: Inject pubspec.yaml
        script: |
          cat > $APP_NAME/pubspec.yaml << "EOF"
          name: pcb_inspector
          description: PCB inspector test image capture app
          publish_to: "none"

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.11.0
            http: ^1.1.0
            path_provider: ^2.1.2
            image_gallery_saver: ^2.0.3

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      - name: Patch Android minSdkVersion
        script: |
          cd $APP_NAME/android
          sed -i '' 's/minSdkVersion.*/minSdkVersion 21/' app/build.gradle || true

      - name: pub get
        script: |
          cd $APP_NAME
          flutter pub get

      - name: Build APK
        script: |
          cd $APP_NAME
          flutter build apk --release

    artifacts:
      - "$APP_NAME/build/app/outputs/flutter-apk/app-release.apk"

    publishing:
      scripts:
        - name: Print APK path
          script: |
            echo "APK ready at: $APP_NAME/build/app/outputs/flutter-apk/app-release.apk"
